<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="treeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="#111827" stroke="#374151" stroke-width="8"/>
  
  <!-- Tree structure -->
  <g stroke="url(#treeGradient)" stroke-width="4" fill="none">
    <!-- Root to level 1 -->
    <line x1="256" y1="100" x2="180" y2="180" />
    <line x1="256" y1="100" x2="332" y2="180" />
    
    <!-- Level 1 to level 2 (left branch) -->
    <line x1="180" y1="180" x2="120" y2="260" />
    <line x1="180" y1="180" x2="200" y2="260" />
    
    <!-- Level 1 to level 2 (right branch) -->
    <line x1="332" y1="180" x2="312" y2="260" />
    <line x1="332" y1="180" x2="392" y2="260" />
    
    <!-- Level 2 to level 3 (some branches) -->
    <line x1="120" y1="260" x2="80" y2="340" />
    <line x1="120" y1="260" x2="140" y2="340" />
    <line x1="392" y1="260" x2="372" y2="340" />
    <line x1="392" y1="260" x2="432" y2="340" />
  </g>
  
  <!-- Nodes -->
  <g fill="url(#treeGradient)">
    <!-- Root node -->
    <circle cx="256" cy="100" r="20" />
    
    <!-- Level 1 nodes -->
    <circle cx="180" cy="180" r="16" />
    <circle cx="332" cy="180" r="16" />
    
    <!-- Level 2 nodes -->
    <circle cx="120" cy="260" r="14" />
    <circle cx="200" cy="260" r="14" />
    <circle cx="312" cy="260" r="14" />
    <circle cx="392" cy="260" r="14" />
    
    <!-- Level 3 nodes -->
    <circle cx="80" cy="340" r="12" />
    <circle cx="140" cy="340" r="12" />
    <circle cx="372" cy="340" r="12" />
    <circle cx="432" cy="340" r="12" />
  </g>
  
  <!-- Selected node highlight (representing evaluation/selection) -->
  <circle cx="200" cy="260" r="18" fill="none" stroke="#fbbf24" stroke-width="3" stroke-dasharray="5,3" />
  
  <!-- Brain/lightbulb hint at top -->
  <path d="M256 60 C246 60 238 68 238 78 C238 84 241 89 246 92 L246 100 L266 100 L266 92 C271 89 274 84 274 78 C274 68 266 60 256 60" 
        fill="#60a5fa" opacity="0.8"/>
</svg>
